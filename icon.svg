<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#080809"/>
  <rect x="40" y="40" width="432" height="432" fill="none" stroke="#00ff41" stroke-width="8"/>
  <!-- PS1-style low-poly triangle shape -->
  <polygon points="256,80 420,380 92,380" fill="none" stroke="#00ff41" stroke-width="6"/>
  <polygon points="256,140 370,350 142,350" fill="#00ff4122" stroke="#00ff41" stroke-width="3"/>
  <polygon points="256,200 320,320 192,320" fill="#00ff4144" stroke="#00ff41" stroke-width="2"/>
  <!-- grid dots -->
  <circle cx="256" cy="80" r="8" fill="#00ff41"/>
  <circle cx="420" cy="380" r="8" fill="#00ff41"/>
  <circle cx="92" cy="380" r="8" fill="#00ff41"/>
  <!-- label -->
  <text x="256" y="470" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="32" font-weight="bold" letter-spacing="6">PS1</text>
</svg>
